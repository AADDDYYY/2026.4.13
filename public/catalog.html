        let currentDivision = 'all';
        let searchQuery = '';

        function renderProducts() {
            const tbody = document.getElementById('productTableBody');
            const filtered = products.filter(p => {
                const matchesDivision = currentDivision === 'all' || p.divisions.includes(currentDivision);
                const matchesSearch = p.name.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                     p.type.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesDivision && matchesSearch;
            });

            tbody.innerHTML = filtered.map(p => `
                <tr class="hover:bg-white/[0.03] transition-colors group">
                    <td class="p-6">
                        <div class="text-sm font-bold tracking-tight group-hover:text-brand-blue transition-colors">${p.name}</div>
                        <div class="text-[10px] text-white/20 uppercase tracking-widest mt-1">${p.type}</div>
                        ${p.divisions.length > 1 && currentDivision !== 'all' && !p.divisions[0].includes(currentDivision) ? 
                          `<span class="inline-block mt-2 px-2 py-0.5 bg-brand-blue/10 text-brand-blue text-[8px] font-bold rounded uppercase tracking-widest">通用款 / 关联型号</span>` : ''}
                    </td>
                    <td class="p-6 text-xs text-white/60">${p.appearance}</td>
                    <td class="p-6 text-xs text-white/60">${p.solidContent}</td>
                    <td class="p-6 text-xs text-white/60">${p.pH}</td>
                    <td class="p-6 text-xs text-white/60">${p.viscosity}</td>
                    <td class="p-6">
                        <div class="flex flex-col text-[10px]">
                            <span class="text-white/60">TG: ${p.tg}</span>
                            <span class="text-white/40">MFFT: ${p.mfft}</span>
                        </div>
                    </td>
                    <td class="p-6">
                        <div class="flex flex-wrap gap-1">
                            ${p.features.map(f => `<span class="px-2 py-0.5 bg-white/5 rounded text-[9px] text-white/40 border border-white/5">${f}</span>`).join('')}
                        </div>
                    </td>
                    <td class="p-6 text-right">
                        <a href="/contact?type=tds&product=${encodeURIComponent(p.name)}" class="text-[10px] font-bold uppercase tracking-widest text-brand-blue hover:underline">索取 TDS</a>
                    </td>
                </tr>
            `).join('');

            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="p-20 text-center text-white/20 font-light">未找到匹配的产品</td></tr>`;
            }
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderProducts();
        });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => {
                    b.classList.remove('active', 'bg-brand-blue', 'text-white');
                    b.classList.add('bg-white/5', 'text-white/40');
                });
                btn.classList.add('active', 'bg-brand-blue', 'text-white');
                btn.classList.remove('bg-white/5', 'text-white/40');
                currentDivision = btn.dataset.division;
                renderProducts();
            });
        });

        renderProducts();
    </script>
